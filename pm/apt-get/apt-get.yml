managers:
  - id: "apt-get"
    remotes:
      - id: "all"
        cli:
          - intent: "sync-all"
            cmd: "apt-get update"
            privileged: true
          - intent: "update-all"
            cmd: "apt-get upgrade -y"
            privileged: true
        packages:
          # system
          - id: "xdg-desktop-portal"
          - id: "xdg-desktop-portal-gtk"
          - id: "libglib2.0-bin"
          - id: "lxpolkit"
          - id: "pkexec"
          - id: "udisks2"
          - id: "gnome-disk-utility"
          - id: "perl"
          - id: "bluetooth"
          - id: "upower"
          - id: "libavcodec-extra"
          - id: "libfuse2"
          - id: "brightnessctl"
          # network
          - id: "resolvconf"
          # shared
          - id: "fonts-jetbrains-mono"
          - id: "ttf-mscorefonts-installer"
          # window manager - x11
          - id: "xorg"
          - id: "i3-wm"
          - id: "alacritty"
          - id: "suckless-tools"
          - id: "scrot"
          - id: "xdotool"
          - id: "arandr"
          # window manager - wayland
          - id: "xdg-desktop-portal-wlr"
          - id: "xwayland"
          - id: "sway"
          - id: "foot"
          - id: "grim"
          - id: "slurp"
          # audio
          - id: "pipewire"
          - id: "pipewire-alsa"
          - id: "pipewire-pulse"
          - id: "pulseaudio-utils"
          - id: "pipewire-jack"
          - id: "wireplumber"
          - id: "libspa-0.2-libcamera"
          - id: "libspa-0.2-bluetooth"
          - id: "alsa-tools"
          - id: "alsa-utils"
          # media
          - id: "mpv"
          - id: "vlc"
          - id: "zathura"
          - id: "zathura-cb"
          - id: "zathura-djvu"
          - id: "zathura-pdf-poppler"
          - id: "zathura-ps"
          - id: "poppler-utils"
          - id: "obs-studio"
          # tools
          - id: "bemenu"
          - id: "libbemenu-curses"
          - id: "libbemenu-wayland"
          - id: "libbemenu-x11"
          - id: "curl"
          - id: "fzf"
          - id: "eza"
