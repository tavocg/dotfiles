          - id: "unzip"
          - id: "imagemagick"
          - id: "tmux"
          - id: "bat"
          - id: "nnn"
          - id: "exiftool"
          - id: "groff"
          - id: "grap"
          - id: "zoxide"
          - id: "tokei"
          - id: "git"
          - id: "lazygit"
          - id: "shellcheck"
          - id: "jq"
          - id: "android-sdk-platform-tools"
          - id: "btop"
          - id: "python3-venv"
          - id: "7zip"
          - id: "imv"
          - id: "r-base"
          - id: "r-base-dev"
