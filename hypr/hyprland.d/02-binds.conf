bind = $mod SHIFT, O, exec, $passotp
bind = $mod, O, exec, $sound
bind = $mod, I, exec, $wifi
bind = $mod, U, exec, $bluetooth
bind = $mod, E, exec, $filemanager
bind = $mod, W, exec, $browser
