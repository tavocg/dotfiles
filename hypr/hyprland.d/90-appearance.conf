# https://wiki.hypr.land/Configuring/Variables/#general
general {
    border_size = 2
    col.active_border = rgba(7fbbb3ff)
}

animations {
    # https://wiki.hypr.land/Configuring/Animations/#curves
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # https://wiki.hypr.land/Configuring/Animations/
    animation = global,        1,     8,     default
    animation = border,        1,     4.2,   easeOutQuint
    animation = windows,       1,     3.8,   easeOutQuint
    animation = windowsIn,     1,     3.3,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.2,   linear,       popin 87%
    animation = fadeIn,        1,     1.4,   almostLinear
    animation = fadeOut,       1,     1.2,   almostLinear
    animation = fade,          1,     2.4,   quick
    animation = layers,        1,     3.0,   easeOutQuint
    animation = layersIn,      1,     3.2,   easeOutQuint, fade
    animation = layersOut,     1,     1.2,   linear,       fade
    animation = fadeLayersIn,  1,     1.4,   almostLinear
    animation = fadeLayersOut, 1,     1.1,   almostLinear
    animation = workspaces,    1,     1.4,   almostLinear, slide
    animation = workspacesIn,  1,     1.0,   almostLinear, slide
    animation = workspacesOut, 1,     1.4,   almostLinear, slide
    animation = zoomFactor,    1,     5.5,   quick
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 0.9
}
